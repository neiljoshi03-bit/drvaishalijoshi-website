<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 620" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3A1520"/>
      <stop offset="100%" stop-color="#6B1E2E"/>
    </linearGradient>
    <linearGradient id="organ" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5E5E8" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#E8CCD1" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <rect width="700" height="620" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="rgba(255,255,255,0.04)" stroke-width="0.5">
    <line x1="0" y1="155" x2="700" y2="155"/>
    <line x1="0" y1="310" x2="700" y2="310"/>
    <line x1="0" y1="465" x2="700" y2="465"/>
    <line x1="175" y1="0" x2="175" y2="620"/>
    <line x1="350" y1="0" x2="350" y2="620"/>
    <line x1="525" y1="0" x2="525" y2="620"/>
  </g>

  <!-- Anatomical illustration: uterus, fallopian tubes, ovaries -->
  <g transform="translate(350,310)">

    <!-- Fallopian tubes (curved, symmetrical) -->
    <path d="M 0,-50 C -60,-90 -120,-90 -170,-70 C -210,-55 -235,-30 -245,0"
          fill="none" stroke="url(#organ)" stroke-width="10" stroke-linecap="round" opacity="0.9"/>
    <path d="M 0,-50 C 60,-90 120,-90 170,-70 C 210,-55 235,-30 245,0"
          fill="none" stroke="url(#organ)" stroke-width="10" stroke-linecap="round" opacity="0.9"/>

    <!-- Fimbriae (tube ends) -->
    <g stroke="url(#organ)" stroke-width="3" stroke-linecap="round" opacity="0.8" fill="none">
      <path d="M -245,0 L -258,-8"/>
      <path d="M -245,0 L -263,-2"/>
      <path d="M -245,0 L -258,8"/>
      <path d="M 245,0 L 258,-8"/>
      <path d="M 245,0 L 263,-2"/>
      <path d="M 245,0 L 258,8"/>
    </g>

    <!-- Ovaries (left & right) -->
    <ellipse cx="-225" cy="30" rx="32" ry="22" fill="url(#organ)" opacity="0.95"/>
    <ellipse cx="225" cy="30" rx="32" ry="22" fill="url(#organ)" opacity="0.95"/>

    <!-- Ovary texture/follicles -->
    <g fill="#6B1E2E" opacity="0.35">
      <circle cx="-232" cy="25" r="3"/>
      <circle cx="-218" cy="32" r="2.5"/>
      <circle cx="-225" cy="38" r="2"/>
      <circle cx="232" cy="25" r="3"/>
      <circle cx="218" cy="32" r="2.5"/>
      <circle cx="225" cy="38" r="2"/>
    </g>

    <!-- Uterus body (pear shape) -->
    <path d="M -55,-55 C -70,-20 -75,40 -55,95 C -30,135 30,135 55,95 C 75,40 70,-20 55,-55 C 30,-75 -30,-75 -55,-55 Z"
          fill="url(#organ)" opacity="0.95"/>

    <!-- Uterine cavity (inner triangle) -->
    <path d="M -25,-35 L 25,-35 L 0,80 Z"
          fill="#6B1E2E" opacity="0.28"/>

    <!-- Cervix -->
    <path d="M -22,130 C -25,150 -15,165 0,165 C 15,165 25,150 22,130 Z"
          fill="url(#organ)" opacity="0.9"/>

    <!-- Tube connection to uterus (light accents) -->
    <circle cx="-55" cy="-50" r="4" fill="url(#organ)" opacity="0.95"/>
    <circle cx="55" cy="-50" r="4" fill="url(#organ)" opacity="0.95"/>

    <!-- Subtle highlights -->
    <ellipse cx="-20" cy="-20" rx="18" ry="35" fill="#fff" opacity="0.08"/>
    <ellipse cx="-232" cy="24" rx="10" ry="6" fill="#fff" opacity="0.15"/>
    <ellipse cx="218" cy="24" rx="10" ry="6" fill="#fff" opacity="0.15"/>

  </g>

  <!-- Bottom label strip (subtle) -->
  <g opacity="0.35">
    <text x="350" y="568" font-family="Georgia, serif" font-size="14" font-style="italic"
          fill="#F5E5E8" text-anchor="middle" letter-spacing="4">Reproductive Anatomy</text>
    <line x1="280" y1="580" x2="420" y2="580" stroke="#F5E5E8" stroke-width="0.5"/>
  </g>
</svg>
